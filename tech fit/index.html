<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Fit | Performance Otimizada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --tech-blue: #0047AB;
            --neon-green: #39FF14;
            --dark-bg: #121212;
        }

        body { background-color: var(--dark-bg); color: #fff; font-family: 'Courier New', Courier, monospace; }
        
        /* rodape */
        .navbar { border-bottom: 1px solid var(--tech-blue); }
        .nav-link { color: #fff !important; }
        .nav-link:hover { color: var(--neon-green) !important; text-shadow: 0 0 8px var(--neon-green); }

        /* Hero Section */
        .hero-section { min-height: 80vh; display: flex; align-items: center; }
        .hero-text h1 { color: var(--neon-green); font-size: 3.5rem; }
        
        /* Botão Estilo Terminal */
        .btn-tech { border: 2px solid var(--neon-green); color: var(--neon-green); background: transparent; padding: 10px 25px; transition: 0.3s; }
        .btn-tech:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Imagem */
        .img-placeholder { background: #333; height: 400px; border-left: 5px solid var(--tech-blue); }

        /* Rodapé */
        footer { border-top: 1px solid #333; padding: 20px 0; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">tech fit <span class="text-success">_</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Planos</a>
                <a class="nav-link" href="#">Cadastro</a>
                <a class="nav-link" href="#">Matrícula</a>
            </div>
        </div>
    </nav>

    <section class="container hero-section">
        <div class="row align-items-center w-100">
            <div class="col-md-6 hero-text" id="area-hero">
    <h1>Programe seu corpo</h1>
    <p class="lead">Sistemas de treino otimizados. Infraestrutura de ponta. Resultados rastreáveis.</p>
    <button id="btn-iniciar" class="btn btn-tech mt-3">INICIAR COMPILAÇÃO</button>
</div>
            <div class="col-md-6">
                <div class="img-placeholder rounded d-flex align-items-center justify-content-center">
                     <img src="img/academia.jpeg" alt="academia">
                </div>
            </div>
        </div>
    </section>
    <section id="secao-planos" class="container py-5" style="display: none;">
    <h2 class="text-center mb-5" style="color: var(--neon-green);">Nossos Planos</h2>
    <div class="row g-4" id="lista-planos">
        </div>
</section>
<div class="container py-5">
    <div class="row justify-content-center"> <div class="col-12 col-md-8 col-lg-6"> <form id="cadastroForm" class="p-4 border border-secondary rounded bg-dark">
                <h4 class="text-success mb-4 text-center">Cadastro Tech Fit</h4>
                
                <div class="mb-3">
                    <label for="nome" class="form-label text-success small">Nome Completo</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nome" placeholder="Ex: Geizer Silva" required>
                </div>
                
                <div class="mb-3">
                    <label for="nascimento" class="form-label text-success small">Data de Nascimento</label>
                    <input type="date" class="form-control bg-dark text-white border-secondary" id="nascimento" required>
                </div>
                
                <div class="mb-3">
                    <label for="cpf" class="form-label text-success small">CPF</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="cpf" placeholder="000.000.000-00" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label text-success small">E-mail</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" placeholder="nome@exemplo.com" required>
                </div>
                
                <div class="mb-3">
                    <label for="endereco" class="form-label text-success small">Endereço Completo</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="endereco" placeholder="Rua, Número, Cidade" required>
                </div>
                
                <div class="mb-3">
                    <label for="genero" class="form-label text-success small">Gênero</label>
                    <select class="form-select bg-dark text-white border-secondary" id="genero" required>
                        <option value="" disabled selected>Selecione seu gênero</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-outline-success w-100 mt-3">CONFIRMAR CADASTRO</button>
            </form>

        </div>
    </div>
</div>
 

    <footer class="text-center">
        <div class="container">
            v.2.0.0 | direitos reservados gg e cn  | © 2026 Tech Fit
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script src="script.js"></script>

</html>
